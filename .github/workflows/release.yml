name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python + inject version + build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          AUTO_INSTALL_PYTHON=true \
          PYTHON_VERSION=3.13 \
          bash scripts/build.sh --build --version "$VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/memorybridge.pyz
            dist/memorybridge.pyz.sha256
          generate_release_notes: true
