name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Build wheel
        run: uv build

      - name: Install shiv
        run: uv tool install shiv --python 3.11

      - name: Build .pyz with shiv
        run: |
          uvx shiv \
            --compressed \
            --console-script host-manager \
            --output-file dist/memorybridge.pyz \
            .

      - name: Generate checksum
        run: cd dist && sha256sum memorybridge.pyz > memorybridge.pyz.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/memorybridge.pyz
            dist/memorybridge.pyz.sha256
